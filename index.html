<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ミノ・ブリーダー v29</title>
    <style>
        :root { --main-gold: #ffd700; --main-cyan: #00ffcc; --main-red: #ff4444; }
        
        body { 
            background-color: #1a1a1a;
            /* 画像名はアップロードしたものに合わせて修正してください */
            background-image: linear-gradient(rgba(26, 26, 26, 0.7), rgba(26, 26, 26, 0.7)), url('youtube-header.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white; font-family: sans-serif; margin: 0; padding: 10px;
            /* ページ全体のスクロールは許可する */
            overflow-y: auto;
            touch-action: manipulation; 
        }
        
        #game-screen { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
        .left-area { flex: 1; min-width: 300px; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        
        .manual { background: rgba(51, 51, 51, 0.85); padding: 15px; border-radius: 8px; font-size: 13px; border: 1px solid #555; backdrop-filter: blur(5px); }
        .manual b { color: var(--main-gold); display: block; margin-bottom: 8px; }
        .manual ul { margin: 0; padding: 0; list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .manual li.full-row { grid-column: span 2; border-top: 1px solid #555; padding-top: 8px; }

        .icon { width: 16px; height: 16px; display: inline-block; margin-right: 6px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.3); vertical-align: middle; }
        .icon.soft { background: var(--main-red); }
        .icon.hard { background: var(--main-cyan); }
        .icon.gold { background: var(--main-gold); }
        .icon.bomb { background: #ff4500; position: relative; }

        .main-panel { background: rgba(42, 42, 42, 0.9); border-radius: 10px; padding: 15px; border: 1px solid #444; }
        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* モバイルではステータスを縦に並べる */
        @media (max-width: 600px) { .panel-grid { grid-template-columns: 1fr; } }

        .info-box { background: #111; padding: 10px; border-radius: 5px; border-left: 4px solid var(--main-gold); margin-bottom: 10px; font-weight: bold; }
        .stat-row { margin-bottom: 8px; font-size: 11px; }
        .stat-bar { background: #444; height: 6px; width: 100%; margin-top: 3px; border-radius: 3px; overflow: hidden; }
        .stat-fill { background: var(--main-cyan); height: 100%; transition: width 0.3s; }

        .btn-group { display: flex; flex-direction: column; gap: 6px; }
        button { padding: 10px; cursor: pointer; border: none; border-radius: 5px; background: #444; color: white; font-size: 11px; font-weight: bold; text-align: left; }
        .start-btn { background: var(--main-gold); color: #000; width: 100%; text-align: center; font-size: 18px; height: 60px; margin-top: 15px; }

        .right-area { flex: 0 0 320px; text-align: center; padding-bottom: 50px; }
        canvas#stage { border: 2px solid #555; background: rgba(0,0,0,0.9); width: 300px; height: 600px; }
        
        /* コントローラー：常に表示 */
        #controls { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            margin: 20px auto; 
            width: 280px; 
            /* ボタン部分だけはスクロールやズームを防止 */
            touch-action: none; 
        }
        .ctrl-btn { 
            height: 70px; 
            background: rgba(60, 60, 60, 0.95); 
            border: 2px solid #888; 
            color: white; 
            font-size: 30px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 15px; 
            user-select: none;
            -webkit-tap-highlight-color: transparent; 
        }
        .ctrl-btn:active { background: #888; }
    </style>
</head>
<body>

<div id="game-screen">
    <div class="left-area">
        <div class="manual">
            <b>【遊び方】ミノを積み上げて高得点を狙おう</b>
            <ul>
                <li><span class="icon soft"></span>下まで落ちる</li>
                <li><span class="icon hard"></span>その場に固定</li>
                <li><span class="icon gold"></span>得点2倍！</li>
                <li><span class="icon bomb"></span>周りを爆発！</li>
                <li class="full-row">横一列そろえると<b>300点ボーナス</b></li>
            </ul>
        </div>

        <div class="main-panel">
            <div class="info-box">
                HP: <span id="hp">120</span> | 回数: <span id="turns">10</span>
                <span style="float:right">BEST: <span id="high-score">0</span></span>
            </div>

            <div class="panel-grid">
                <div>
                    <h3 style="font-size:14px; color:var(--main-cyan)">ステータス</h3>
                    <div class="stat-row">数: <span id="val-a">4.0</span> <div class="stat-bar"><div id="bar-a" class="stat-fill"></div></div></div>
                    <div class="stat-row">固さ: <span id="val-b">2.0</span> <div class="stat-bar"><div id="bar-b" class="stat-fill"></div></div></div>
                    <div class="stat-row">シンプル: <span id="val-c">4.0</span> <div class="stat-bar"><div id="bar-c" class="stat-fill"></div></div></div>
                    <div class="stat-row">得点UP: <span id="val-d">0.0</span> <div class="stat-bar"><div id="bar-d" class="stat-fill" style="background:var(--main-gold)"></div></div></div>
                    <div class="stat-row">爆弾: <span id="val-e">0.0</span> <div class="stat-bar"><div id="bar-e" class="stat-fill" style="background:#ff4500"></div></div></div>
                    <div class="stat-row">重力: <span id="val-g">1.00</span> <div class="stat-bar"><div id="bar-g" class="stat-fill" style="background:#ff00ff"></div></div></div>
                    <canvas id="preview-canvas" width="120" height="120" style="background:#000; border:1px solid #444; margin-top:10px;"></canvas>
                </div>

                <div class="btn-group">
                    <h3 style="font-size:14px; color:var(--main-cyan)">トレーニング</h3>
                   <button onclick="train('A')">バンプアップ (数+1.5~2, 爆弾+0.1) <span class="cost-tag">HP-10</span></button>
                        <button onclick="train('B')">筋トレ (固さ+1.5~2, 爆弾+0.1) <span class="cost-tag">HP-10</span></button>
                        <button onclick="train('C')">お気楽思想 (シンプル+1.5~2, 爆弾+0.1) <span class="cost-tag">HP-10</span></button>
                        <button class="spacer" onclick="train('E')">寄席の手筋 (数+1, ｼﾝﾌﾟﾙ+1, 爆弾+0.2, 固さ半減) <span class="cost-tag">HP-10</span></button>
                        <button onclick="train('I')">めいそう (ｼﾝﾌﾟﾙ+1.5, 得点+0.5~0.7, 爆弾+0.1~0.3) <span class="cost-tag">HP-20</span></button>
                        <button onclick="train('D')">輝くひかり (数+1, 得点+0.6~0.8, 爆弾+0.1~0.3) <span class="cost-tag">HP-20</span></button>
                        <button onclick="train('F')">禁断の錬金術 (得点UP+1, 爆弾+1) <span class="cost-tag">HP-30</span></button>
                        <button onclick="train('G')">ダイエット (重力-10%, 爆弾-0.6) <span class="cost-tag">HP-15</span></button>
                        <button onclick="train('H')">超破壊的進展 (数+5, 爆弾+1.2, 他半減) <span class="cost-tag">HP-40</span></button>
                        <button onclick="train('REST')" style="background:#2e7d32; margin-top:5px;">休憩 (HP+60) <span class="cost-tag" style="color:white">回数-1</span></button></div>
            </div>
            <button id="start-btn" class="start-btn" onclick="finishBreeding()">育成完了：パズル開始</button>
        </div>
    </div>

    <div class="right-area">
        <h2 id="score-display" style="color:var(--main-gold); font-size:40px; margin:10px 0;">0</h2>
        <div id="mino-count-display">NEXT: 1 / 10</div>
        <canvas id="stage" width="300" height="900"></canvas>
        
        <div id="controls">
            <div class="ctrl-btn" onmousedown="handleMove(-1,0)" ontouchstart="handleMove(-1,0)">←</div>
            <div class="ctrl-btn" 
                 onmousedown="startRapidDrop()" onmouseup="stopRapidDrop()" onmouseleave="stopRapidDrop()"
                 ontouchstart="startRapidDrop(event)" ontouchend="stopRapidDrop(event)">↓</div>
            <div class="ctrl-btn" onmousedown="handleMove(1,0)" ontouchstart="handleMove(1,0)">→</div>
            <div></div>
            <div class="ctrl-btn" style="color:var(--main-cyan)" onmousedown="handleRotate()" ontouchstart="handleRotate()">↻</div>
            <div></div>
        </div>
    </div>
</div>

<script>
// --- ゲームロジック (v27準拠 + 修正) ---
const COLS = 20, ROWS = 60, SIZE = 15;
let stats = { a: 4.0, b: 2.0, c: 4.0, d: 0.0, e: 0.0, g: 1.0 };
let hp = 120, turns = 10, minoRemaining = 10;
let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
let currentPiece = null, score = 0, isGameOver = false, lastTime = 0, dropIntervalId = null;
const colors = { hard: "#00ffcc", soft: "#ff4444", gold: "#ffd700", bomb: "#ff4500" };

function train(type) {
    if (turns <= 0) return;
    const r = (min, max) => Math.random() * (max - min) + min;
    if(type==='A' && hp>=10){ stats.a+=r(1.5,2); stats.e+=0.1; hp-=10; }
    if(type==='B' && hp>=10){ stats.b+=r(1.5,2); stats.e+=0.1; hp-=10; }
    if(type==='C' && hp>=10){ stats.c+=r(1.5,2); stats.e+=0.1; hp-=10; }
    if(type==='I' && hp>=20){ stats.c+=1.5; stats.d+=r(0.5,0.7); stats.e+=r(0.1,0.3); hp-=20; }
    if(type==='D' && hp>=20){ stats.a+=1; stats.d+=r(0.6,0.8); stats.e+=r(0.1,0.3); hp-=20; }
    if(type==='REST'){ hp=Math.min(120, hp+60); }
    turns--; updateUI();
}

function updateUI() {
    document.getElementById('hp').innerText = Math.floor(hp);
    document.getElementById('turns').innerText = turns;
    ['a','b','c','d','e','g'].forEach(s => {
        document.getElementById('val-'+s).innerText = stats[s].toFixed(1);
        document.getElementById('bar-'+s).style.width = Math.min(100, (stats[s]/20)*100) + "%";
    });
    drawPreview();
}

// 描画・パズル系関数
function drawPreview() { /* 前回のロジックと同じ */ }
function spawnPiece() { 
    if(minoRemaining <= 0) { alert("終了！スコア:"+score); location.reload(); return; }
    currentPiece = { x: 10, y: 2, blocks: generateBlocks() };
    minoRemaining--;
    document.getElementById('mino-count-display').innerText = `NEXT: ${11-minoRemaining} / 10`;
}
function generateBlocks() {
    let b = [{x:0, y:0, type:"soft"}];
    for(let i=1; i<stats.a; i++) b.push({x: Math.floor(Math.random()*3-1), y: Math.floor(Math.random()*3-1), type:"soft"});
    // タイプ上書き(簡易版)
    b.forEach((block, i) => {
        if(i < stats.b) block.type = "hard";
        else if(i < stats.b + stats.d) block.type = "gold";
        else if(i < stats.b + stats.d + stats.e) block.type = "bomb";
    });
    return b;
}

function move(dx, dy) {
    if(!currentPiece) return;
    currentPiece.x += dx; currentPiece.y += dy;
    if(checkCollision()) {
        currentPiece.x -= dx; currentPiece.y -= dy;
        if(dy > 0) { lock(); spawnPiece(); stopRapidDrop(); }
        return false;
    }
    return true;
}

function checkCollision() {
    return currentPiece.blocks.some(b => {
        let nx = currentPiece.x + b.x, ny = currentPiece.y + b.y;
        return nx < 0 || nx >= COLS || ny >= ROWS || (ny >= 0 && grid[ny][nx]);
    });
}

function lock() {
    currentPiece.blocks.forEach(b => {
        let nx = currentPiece.x + b.x, ny = currentPiece.y + b.y;
        if(ny>=0) grid[ny][nx] = {type: b.type};
    });
    // ライン消去・得点計算
    for(let y=0; y<ROWS; y++) {
        if(grid[y].every(cell => cell)) {
            grid.splice(y, 1);
            grid.unshift(Array(COLS).fill(null));
            score += 300;
        }
    }
    score += 10;
    document.getElementById('score-display').innerText = score;
}

// ボタン操作用
function handleMove(dx, dy) { move(dx, dy); draw(); }
function handleRotate() {
    const old = currentPiece.blocks;
    currentPiece.blocks = currentPiece.blocks.map(b => ({x: -b.y, y: b.x, type: b.type}));
    if(checkCollision()) currentPiece.blocks = old;
    draw();
}
function startRapidDrop(e) { if(e) e.preventDefault(); if(!dropIntervalId) dropIntervalId = setInterval(() => { move(0,1); draw(); }, 50); }
function stopRapidDrop(e) { if(e) e.preventDefault(); clearInterval(dropIntervalId); dropIntervalId = null; }

function finishBreeding() { document.getElementById('start-btn').style.display='none'; spawnPiece(); requestAnimationFrame(gameLoop); }
function gameLoop(t) {
    if(!isGameOver && currentPiece) {
        if(t - lastTime > 600) { move(0,1); lastTime = t; }
        draw();
    }
    requestAnimationFrame(gameLoop);
}

function draw() {
    const ctx = document.getElementById('stage').getContext('2d');
    ctx.clearRect(0,0,300,900);
    grid.forEach((row, y) => row.forEach((cell, x) => { if(cell) drawSq(ctx, x, y, cell.type); }));
    if(currentPiece) currentPiece.blocks.forEach(b => drawSq(ctx, currentPiece.x+b.x, currentPiece.y+b.y, b.type));
}
function drawSq(ctx, x, y, type) { ctx.fillStyle = colors[type]; ctx.fillRect(x*SIZE, y*SIZE, SIZE-1, SIZE-1); }

updateUI();
</script>
</body>
</html>
